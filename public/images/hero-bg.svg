<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#faf8f3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef6e4;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="bg2" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#a8b09a;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#a8b09a;stop-opacity:0" />
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" />
      <feBlend mode="multiply" />
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg1)" />
  <rect width="1920" height="1080" fill="url(#bg2)" />
  <rect width="1920" height="1080" fill="#ffffff" opacity="0.02" filter="url(#noise)" />
</svg>
